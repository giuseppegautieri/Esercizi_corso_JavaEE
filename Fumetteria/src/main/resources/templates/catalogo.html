<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8">
		<title>Manga World | Catalogo</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.min.css" rel="stylesheet">
		<style>
			body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
			.hero { background: linear-gradient(rgba(0, 0, 0, 0,.7),rgba(0, 0, 0, 0.7)), url('https://images.unsplash.com/photo-1578632738908-4521c617e1b3?q=80&w=2070'); 			
					background-size: cover; padding: 60px 0; text-align: center; border-bottom: 4px solid #ff4757; }
			        .card-fumetteria { background: #1e1e1e; border: none; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 10px 20px rgb(102, 108, 100); }
			        .card-header { background: #ff4757; color: white; border-radius: 15px 15px 0 0 !important; font-weight: bold; font-size: 1.5rem; }
			        .card-body p { color: antiquewhite !important;}
					.card-body h5 { color:antiquewhite !important;}
					.manga-item { background: #3d3d3d; border-radius: 8px; padding: 10px; margin-bottom: 10px; border-left: 5px solid #ffa502; color: #ffffff }
			        .badge-price { background-color: #2f3542; color: #7bed9f; font-size: 1rem; }
			        .autore { color: #ced4ad; font-style: italic; font-size: 0.9rem;}
		</style>
	</head>
	<body>
		<div class="hero">
			<h1 class="diplay-3">Manga World</h1>
			<p class="lead">Esplora le migliori fumetterie e le loro collezioni</p>
		</div>
		<div class="container mt-5">
			<div class="row">
				<div class="col-md-6" th:each="f : ${elenco}">
					<div class="card card-fumetteria">
						<div class="card-header text-center" th:text="${f.nome}">Nome Fumetteria</div>
						<div class="card-body">
							<p class="text-center">
								<i class="bi bi-geo-alt"></i>
								<span th:text="${f.indirizzo}">Indirizzo</span>
							</p>
							<hr>
							<h5 class="mb-3">Manga disponibili:</h5>
							<div class="manga-item d-flex justify-content-between align-item-center" th:each="m : ${f.listaManga}">
								<div>
									<strong th:text="${m.titolo}">Titolo</strong>
									<br>
									<span class="autore" th:text="${'Autore: ' + m.autore}">Autore</span>
								</div>
								<span class="badge badge-price" th:text="${'€' + m.prezzo}">5.90</span> 
							</div>
							<div th:if="${#lists.isEmpty(f.listaManga)}" class="text-muted text-center">Nessun manga disponibile in questo store.</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		<footer class="text-center mt-5 mb-4 text-muted">
			<p>&copy; 2026 Manga World Project - Corso JEE</p>
		</footer>
	</body>
</html>
