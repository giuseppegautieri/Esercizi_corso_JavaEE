<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro Elettorale</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5" style="background-color: #f4f7f6;">
    <div class="container bg-white p-4 shadow rounded">
        <h1 class="text-center mb-4">Registro Elettori</h1>

        <form action="/elenco-voto" method="get" class="row g-3 mb-4">
            <div class="col-auto">
                <input type="text" name="cf" class="form-control" placeholder="Inserisci Codice Fiscale">
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-primary">Cerca</button>
                <a href="/elenco-voto" class="btn btn-secondary">Tutti</a>
            </div>
        </form>
        
        <table class="table table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Elettore</th>
                    <th>Codice Fiscale</th>
                    <th>Scadenza</th>
                    <th>Stato</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="t : ${listaTessere}">

                    <td th:text="${t.persona != null ? t.persona.nome + ' ' + t.persona.cognome : 'NON ASSEGNATO'}"></td>
                    <td th:text="${t.persona != null ? t.persona.codiceFiscale : '-'}"></td>

                    <td th:text="${t.dataScadenza != null ? t.dataScadenza : 'N/D'}"></td>
                    
                    <td>
                        <span th:if="${t.dataScadenza != null and t.dataScadenza.isBefore(oggi)}" class="badge bg-danger">SCADUTA</span>
                        <span th:if="${t.dataScadenza != null and !t.dataScadenza.isBefore(oggi)}" class="badge bg-success">VALIDA</span>
                        <span th:if="${t.dataScadenza == null}" class="badge bg-warning">DATA ERRATA</span>
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="text-center mt-3">
            <a href="/" class="btn btn-outline-dark">Torna alla Home</a>
        </div>
    </div>
</body>
</html>
