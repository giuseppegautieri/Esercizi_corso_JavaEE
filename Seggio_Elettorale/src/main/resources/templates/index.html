<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8">
		<title> Portale Elettorale | Home</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
		<style>
			body { background-color: #f4f7f6; }
			.hero-section { background: #0d6efd; color: white; padding: 60px 0; margin-bottom: 40px; }
	        .card-menu { transition: transform 0.3s; cursor: pointer; text-decoration: none; color: inherit; }
		    .card-menu:hover { transform: translateY(-10px); }
		</style>
	</head>
	<body>
		<div class="hero-section text-center">
			<h1>Ministero del Voto</h1>
			<p class="lead">Sistema Gestione Seggi e Tessere Elettorali</p>
		</div>
		
		<div class="container">
			<div class="row justify-content-center g-4">
				<a href="/elenco-voto" class="col-md-4 card-menu">
					<div class="card h-100 shadow-sm border-0">
						<div class="card-body text-center">
							<h3 class="card-title">Registro elettorale</h3>
							<p class="text-muted">Visualizza l'elenco completo, controlla scadenze e cerca per CF.</p>
							<span class="btn btn-outline-primary">Entra</span>
						</div>
					</div>
				</a>
				<a href="/seggi" class="col-md-4 card-menu">
					<div class="card h-100 shadow-sm border-0">
						<div class="card-body text-center">
							<h3 class="card-title">Gestione Seggi</h3>
							<p class="text-muted">Consulta le sedi elettorali, le città e le provincie</p>
							<span class="btn btn-outline-primary">Entra</span>
						</div>
					</div>
				</a>
			</div>
		</div>
	</body>
</html>
